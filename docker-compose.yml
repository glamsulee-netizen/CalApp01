# ============================================
# CalApp01 — Docker Compose
# ============================================
# Запуск: docker-compose up -d
# Миграции: docker-compose exec server npx prisma migrate deploy
# Логи: docker-compose logs -f server

version: '3.8'

services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Backend (Node.js + Express) ---
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      SERVER_PORT: ${SERVER_PORT}
      NODE_ENV: ${NODE_ENV}
      APP_URL: ${APP_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_DAILY_LIMIT: ${SMTP_DAILY_LIMIT}
      SMTP_BACKUP_HOST: ${SMTP_BACKUP_HOST}
      SMTP_BACKUP_PORT: ${SMTP_BACKUP_PORT}
      SMTP_BACKUP_USER: ${SMTP_BACKUP_USER}
      SMTP_BACKUP_PASSWORD: ${SMTP_BACKUP_PASSWORD}
      SMTP_BACKUP_FROM: ${SMTP_BACKUP_FROM}
      SMTP_BACKUP_DAILY_LIMIT: ${SMTP_BACKUP_DAILY_LIMIT}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_EMAIL: ${VAPID_EMAIL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD}
      REGISTRATION_OPEN: ${REGISTRATION_OPEN}
      DEFAULT_CALENDAR_START_HOUR: ${DEFAULT_CALENDAR_START_HOUR}
      DEFAULT_CALENDAR_END_HOUR: ${DEFAULT_CALENDAR_END_HOUR}
      DEFAULT_SLOT_DURATION: ${DEFAULT_SLOT_DURATION}
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  # --- Frontend (Vite build → nginx static) ---
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${APP_URL}/api
        VITE_WS_URL: ${APP_URL}
        VITE_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
    restart: unless-stopped
    depends_on:
      - server

  # --- Caddy (reverse proxy + automatic SSL) ---
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
      - client

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  caddy_data:
  caddy_config:
